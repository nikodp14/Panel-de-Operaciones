<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner Bridge</title>
<style>
body{
  font-family: Arial;
  padding:10px;
  margin:0;
  text-align:center;
  overflow:hidden;
}

input{
  font-size:24px;
  padding:10px;
  width:80%;
}

.status{
  margin-top:20px;
  font-size:14px;
  color:#666;
}
</style>
</head>

<body>

<h2>Escáner conectado</h2>

<input id="barcodeInput" placeholder="Esperando escaneo..." autofocus>

<div class="status" id="status">Esperando código...</div>

<script>

  const input = document.getElementById("barcodeInput");
  const status = document.getElementById("status");
  const esLocal = location.hostname === "localhost";
  let modoSupervisor = false;

  let scanBuffer = "";
  let scanTimer = null;
  let startTime = 0;

  document.addEventListener("keydown", (e) => {

    // 🔐 activar modo supervisor
    if (e.ctrlKey && e.altKey && e.key.toLowerCase() === "p") {

      const clave = prompt("Ingrese clave supervisor:");

      if (clave === "4744") {
        modoSupervisor = true;
        status.textContent = "🟢 Modo supervisor activado";
      } else {
        status.textContent = "❌ Clave incorrecta";
      }
    }

    // 🔥 SOLO EN LOCAL
    if ((esLocal || modoSupervisor) && e.key === "Enter") {

      const code = input.value.trim();

      if (!code) return;

      enviarCodigo(code);

      status.textContent = "🧪 Enviado manual: " + code;

      input.value = "";
      scanBuffer = "";

      return;
    }

    const now = Date.now();

    // reset si pasa mucho tiempo entre teclas
    if ((!startTime || now - startTime > 100) && !esLocal) {
      scanBuffer = "";
      startTime = now;
    }

    // ignorar teclas raras
    if (e.key.length > 1) return;

    scanBuffer += e.key;

    clearTimeout(scanTimer);

    scanTimer = setTimeout(() => {

      const duration = Date.now() - startTime;

      // 🔥 VALIDAR QUE ES SCANNER (rápido)
      if ((!esLocal && !modoSupervisor) && (scanBuffer.length >= 6 && duration < 150)) {
        enviarCodigo(scanBuffer);
        status.textContent = "✅ Escaneado: " + scanBuffer;
        input.value = "";
      } else if ((!esLocal && !modoSupervisor)){
        input
        status.textContent = "❌ Entrada manual bloqueada";
        input.value = "";
        scanBuffer = "";
      }

      scanBuffer = "";

    }, 80); // ⏱️ clave: espera corta
  });

  async function enviarCodigo(code) {

    try {

      await fetch("/api/scanner", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ code })
      });

      status.textContent = "Código enviado: " + code;

      window.parent.postMessage({
        type: "scanner-done",
        code
      }, "*");

    } catch (err) {

      status.textContent = "Error enviando código";

    }
  }

</script>

</body>
</html>
