<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner Bridge</title>
<style>
body{
  font-family: Arial;
  padding:10px;
  margin:0;
  text-align:center;
  overflow:hidden;
}

input{
  font-size:24px;
  padding:10px;
  width:80%;
}

.status{
  margin-top:20px;
  font-size:14px;
  color:#666;
}
</style>
</head>

<body>

<h2>Escáner conectado</h2>

<input id="barcodeInput" placeholder="Esperando escaneo..." autofocus>

<div class="status" id="status">Esperando código...</div>

<script>

const input = document.getElementById("barcodeInput");
const status = document.getElementById("status");

let scanBuffer = "";
let scanTimer = null;

input.addEventListener("input", () => {

  scanBuffer = input.value;

  clearTimeout(scanTimer);

  scanTimer = setTimeout(async () => {

    const code = scanBuffer.trim();

    if(!code) return;

    try{

      await fetch("/api/scanner",{
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({ code })
      });

      status.textContent = "Código enviado: " + code;

      window.parent.postMessage({
        type: "scanner-done",
        code
      }, "*");

    }catch(err){

      status.textContent = "Error enviando código";

    }

    input.value = "";
    scanBuffer = "";
    input.focus();

  }, 100); // 🔥 espera 100ms sin escribir

});

</script>

</body>
</html>
