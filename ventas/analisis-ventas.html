<!doctype html>
<html lang="es">
<head>

      <section class="card">

            <thead>

                <th>Ventas</th>
                <th>Código Odoo</th>

              </tr>
            </thead>
            <tbody id="analisisBody"></tbody>
          </table>
        </div>

        <button id="exportarBtn">Exportar</button>
      </section>

    </div>
  </main>
</div>

<script src="/layout.js"></script>
<script src="/ventas/analisis-ventas.js"></script>
