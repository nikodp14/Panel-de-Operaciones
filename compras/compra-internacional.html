<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Compra Internacional</title>

  <!-- MISMO ORDEN que el resto del sistema -->
  <link rel="stylesheet" href="/css/menu.css" />
  <link rel="stylesheet" href="/css/base.css" />

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="/js/config-helpers.js"></script>
</head>
<body>
  <header class="topbar">
    <button id="toggleSidebar" class="icon-btn" aria-label="Mostrar/Ocultar menú">☰</button>
    <h1>Panel de Operaciones</h1>
  </header>

  <div class="layout">
   <div id="__SIDEBAR__"></div>

   <div class="field">

    <main class="content">
      <div class="container">
        <label>N° Cotización</label>
        <input type="text" id="cotizacionInput" class="cotizacion-input" placeholder="Ingrese nro. cotización" style="display:none"/>
        <button id="cargarCotBtn" style="display:none">Cargar</button>
        <button id="usarNumeroCotBtn">Ingresar N° cotización</button>
        <button id="verCotizacionesBtn">Cotizaciones ingresadas</button>
      </div>
      <div class="container parametros-compra">
        <div class="campo">
          <label>Fecha pedido</label>
          <input type="date" id="fechaPedido">
        </div>

        <div class="campo">
          <label>Precio Dólar Compra</label>
          <div id="dolarCalculado">-</div>
        </div>

        <div class="campo">
          <label>% Gan.</label>
          <input type="number" id="gananciaIndividual" value="80" step="1">
        </div>

        <div class="campo">
          <label>% Gan. Pack</label>
          <input type="number" id="gananciaPack" value="70" step="1">
        </div>

      </div>
      <!--<div class="container">
        <label>Para crear producto YAMAHA original duplicar: Base Producto Original</label>
      </div>-->
      <div class="container">
        <section id="comprasResults" class="card compras-card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>
                    Sel.
                    <input type="checkbox" id="checkAllExport">
                  </th>

                  <th>
                    Ingr
                    <input type="checkbox" id="checkAllIngresado">
                  </th>
                  <th>Producto Cot.</th>
                  <th>Cant.</th>
                  <th>Total USD</th>
                  <th>Precio USD</th>
                  <th>Precio Odoo</th>
                  <th>Total línea Odoo</th>
                  <th>Estado Publicación</th>
                  <th>% Gan.</th>
                  <th>Precio Caja</th>
                  <th>Publicación JS</th>
                  <th class="precio-jumpseller-header">Precio Jumpseller / Marketplace</th>
                  <th>Publicación ML</th>
                  <th>Costo Envío ML</th>
                  <th>% Comis.</th>
                  <th>Precio ML</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="comprasBody"></tbody>
              <tfoot>
                <tr>
                  <td colspan="8" style="text-align:right;"><strong>Total Odoo:</strong></td>
                  <td id="totalConIvaFooter">0</td>
                </tr>
              </tfoot>
            </table>
          </div>

          <button id="addRowBtn" class="primary-btn">+ Agregar línea</button>
          <button id="exportarExcelBtn" disabled>Exportar cotización</button>
        </section>

      </div>
    </main>
  </div>
  <div id="cotizacionesModal" class="cotizaciones-modal hidden">
  <div class="cotizaciones-content">
    <div class="cotizaciones-header">
      <h3>Cotizaciones ingresadas</h3>
      <button id="cerrarCotizaciones">✕</button>
    </div>

    <div style="position:relative;">
      <input type="text" id="buscarProductoCot" placeholder="Buscar producto en cotizaciones..." class="cotizacion-buscador">
      <div id="buscarProductoSug" class="odoo-suggestions hidden"></div>
    </div>

    <div id="cotizacionesLista" class="cotizaciones-lista"></div>
    </div>
  </div>

  <script src="/layout.js"></script>
  <script src="/compras/compra-internacional.js"></script>

  <div id="toast" class="toast hidden"></div>
</body>
</html>
